<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WU88 OPEN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tilt+Warp&family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --orange:#FA812F;
    --ink:#484848;
    --muted:#898989;
    --line:#d3d3d3;
    --bg-dot:#e3e3e3;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:#ffffff;
    font-family:'Baloo 2',sans-serif;
    overflow:hidden;
    position:relative;
  }

  /* full-bleed dotted field background */
  .dot-field{
    position:absolute;inset:0;
    background-image: radial-gradient(var(--bg-dot) 1.6px, transparent 1.6px);
    background-size: 60px 60px;
    background-position: 40px 20px;
    pointer-events:none;
  }

  .stage{
    position:relative;
    width:100%;height:100vh;
    max-width:1728px;margin:0 auto;
  }

  .divider{
    position:absolute;
    right:41px;top:0;
    width:1px;height:100%;
    background:var(--line);
  }

  /* dots-ball graphic */
  .dots-ball-wrap{
    position:absolute;
    left:0;top:0;
    width:100%;height:100%;
    pointer-events:none;
  }
  .dots-ball-wrap img{
    position:absolute;
    left:272px;top:40px;
    width:684px;height:798px;
    mix-blend-mode:multiply;
  }

  /* two independent corner dot-grids (NOT part of the panel) */
  .corner-dots{
    position:absolute;
    display:grid;
    grid-template-columns:repeat(6,5px);
    grid-auto-rows:5px;
    gap:10px;
    z-index:2;
  }
  .corner-dots span{width:5px;height:5px;border-radius:50%;background:var(--orange);}
  .corner-dots.grid-a{left:80px;top:0;}       /* pokes above the panel's top edge */
  .corner-dots.grid-b{right:80px;bottom:80px;} /* sits near the bottom of the side nav */

  /* glass panel */
  .panel{
    position:absolute;
    left:40px;top:40px;bottom:40px;
    width:508px;
    border-radius:50px;
    border:1px solid var(--line);
    background:linear-gradient(90deg, rgba(255,255,255,0.98) 19%, rgba(255,255,255,0) 100%);
    backdrop-filter:blur(10px);
    padding:120px 20px 0 40px;
    z-index:1;
  }

  .content-swap{position:relative;z-index:1;}
  .panel h1{
    font-family:'Tilt Warp',sans-serif;
    font-weight:400;
    font-size:100px;
    line-height:96px;
    letter-spacing:35px;
    color:var(--ink);
    transition:opacity .25s ease;
  }
  .panel .fade{opacity:0;}

  /* right nav */
  .side-nav{
    position:absolute;
    right:83px;top:50%;
    transform:translateY(-50%);
    display:flex;flex-direction:column;
    align-items:flex-end;
    gap:46px;
  }
  .side-nav button{
    all:unset;
    cursor:pointer;
    font-family:'Baloo 2',sans-serif;
    font-size:16px;
    letter-spacing:1px;
    color:var(--muted);
    position:relative;
    padding:4px 0;
    text-align:right;
    transition:color .2s ease;
  }
  .side-nav button:hover{color:var(--ink);}
  .side-nav button.active{
    color:var(--ink);
    font-size:20px;
    font-weight:700;
  }
  .side-nav .nav-icon{
    display:none;
    position:absolute;
    right:-44.5px;top:50%;
    transform:translateY(-50%);
    width:44.5px;height:44px;
  }
  .side-nav button.active .nav-icon{display:block;}

  @media (max-width:1100px){
    .side-nav{display:none;}
    .dots-ball-wrap{opacity:.5;}
    .panel{width:calc(100% - 80px);}
  }
</style>
</head>
<body>
<div class="dot-field"></div>
<div class="stage">
  <div class="divider"></div>

  <div class="dots-ball-wrap"><img src="assets/dots-ball.png" alt=""></div>

  <div class="corner-dots grid-a">
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
  </div>
  <div class="corner-dots grid-b">
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="panel">
    <div class="content-swap">
      <h1 id="panel-title">WU88<br/>OPEN</h1>
    </div>
  </div>

  <nav class="side-nav" id="side-nav">
    <button class="active" data-key="about">ABOUT<img class="nav-icon" src="assets/nav-icon.svg" alt=""></button>
    <button data-key="what-we-do">WHAT WE DO<img class="nav-icon" src="assets/nav-icon.svg" alt=""></button>
    <button data-key="reel">REEL<img class="nav-icon" src="assets/nav-icon.svg" alt=""></button>
    <button data-key="latest-project">LATEST&nbsp;&nbsp;PROJECT<img class="nav-icon" src="assets/nav-icon.svg" alt=""></button>
    <button data-key="contact-us">CONTACT US<img class="nav-icon" src="assets/nav-icon.svg" alt=""></button>
  </nav>
</div>

<script>
  const content = {
    "about": "WU88<br/>OPEN",
    "what-we-do": "WHAT<br/>WE DO",
    "reel": "OUR<br/>REEL",
    "latest-project": "LATEST<br/>PROJECT",
    "contact-us": "SAY<br/>HELLO"
  };

  const titleEl = document.getElementById("panel-title");
  const buttons = document.querySelectorAll("#side-nav button");

  buttons.forEach(btn => {
    btn.addEventListener("click", () => {
      buttons.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      titleEl.classList.add("fade");
      setTimeout(() => {
        titleEl.innerHTML = content[btn.dataset.key];
        titleEl.classList.remove("fade");
      }, 200);
    });
  });
</script>
</body>
</html>
